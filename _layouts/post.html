---
layout: default
---
<div class="col-lg-10 offset-lg-1 col-xl-8 offset-xl-2">
    <article>
        <header>
            <h1 class="text-center">{{ page.title }}</h1>
            <h6 class="subtitle post-description text-center">{{ page.date | date_to_long_string }} • [
                {% for category in page.categories %}
                    {{ category }}
                    {% if forloop.last != true %}
                        ,
                    {% endif %}
                {% endfor %}
                ]
            </h6>
        </header>
        <div class="long-text">
          {{ content }}
        </div>
    </article>
</div>
