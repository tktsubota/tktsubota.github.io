---
layout: page
title: "Blog"
---
<div>
    {% for post in site.posts %}
    <div class="row post-row">
        <div class="col-lg-10 offset-lg-1 col-xl-8 offset-xl-2">
            <h3>
                <a href="{{ post.url }}">{{ post.title }}</a>
            </h3>
            <h6>{{ post.date | date_to_long_string }}</h6>
            <p>{{ post.excerpt }}</p>
        </div>
    </div>
    {% endfor %}
</div>
